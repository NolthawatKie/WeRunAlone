<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Head -->
  <circle cx="20" cy="5" r="2.8" fill="#FFFFFF"/>
  <!-- Torso -->
  <path d="M20 8 L16 17" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- Left arm (back, reaching forward) -->
  <path d="M18 11 L10 7" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right arm (front, reaching back) -->
  <path d="M18 11 L26 15" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Left leg (front, stepping forward) -->
  <path d="M16 17 L10 23 L6 26" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right leg (back, pushing off) -->
  <path d="M16 17 L21 22 L24 29" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
